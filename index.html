<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaxBall 2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 10px; letter-spacing: 2px; opacity: .8; }
    #gb { background: #1a3a1a; border-radius: 12px; padding: 14px; user-select: none; }
    #hud {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; font-size: 14px; font-weight: 500;
    }
    .score-box { display: flex; align-items: center; gap: 10px; }
    .team-label { font-size: 12px; opacity: .7; }
    .score { font-size: 30px; font-weight: 500; min-width: 36px; text-align: center; }
    #timer {
      font-size: 16px; opacity: .85;
      background: rgba(0,0,0,.35); padding: 4px 16px; border-radius: 20px;
    }
    #msg { text-align: center; font-size: 13px; min-height: 20px; color: #ffe07a; margin-bottom: 6px; font-weight: 500; }
    canvas { display: block; border-radius: 8px; }
    #controls {
      display: flex; justify-content: space-between;
      margin-top: 8px; font-size: 11px; color: rgba(255,255,255,.4);
    }
    .ctrl-group { display: flex; flex-direction: column; gap: 2px; }
    .ctrl-group span { display: flex; align-items: center; gap: 4px; }
    kbd {
      background: rgba(255,255,255,.12); border-radius: 3px;
      padding: 1px 5px; font-size: 10px; font-family: monospace;
    }
    #btn-restart {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: #fff; border-radius: 6px; padding: 4px 14px;
      font-size: 12px; cursor: pointer;
    }
    #btn-restart:hover { background: rgba(255,255,255,.2); }
  </style>
</head>
<body>
  <h1>⚽ HAXBALL 2</h1>
  <div id="gb">
    <div id="hud">
      <div class="score-box">
        <span class="team-label">🔴 Rossi</span>
        <span class="score" id="sr">0</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <span id="timer">3:00</span>
        <button id="btn-restart">↺ Restart</button>
      </div>
      <div class="score-box">
        <span class="score" id="sb">0</span>
        <span class="team-label">Blu 🔵</span>
      </div>
    </div>
    <div id="msg">WASD + Ctrl per tirare &nbsp;|&nbsp; Frecce + Spazio per tirare</div>
    <canvas id="c"></canvas>
    <div id="controls">
      <div class="ctrl-group">
        <b style="color:rgba(255,255,255,.6)">🔴 Giocatore 1</b>
        <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Muovi</span>
        <span><kbd>Ctrl</kbd> Tiro (tieni per caricare)</span>
      </div>
      <div class="ctrl-group" style="text-align:right;align-items:flex-end">
        <b style="color:rgba(255,255,255,.6)">Giocatore 2 🔵</b>
        <span><kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> Muovi</span>
        <span><kbd>Spazio</kbd> Tiro (tieni per caricare)</span>
      </div>
    </div>
  </div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── DIMENSIONI CAMPO GRANDE ───────────────────────────────────────────────────
const W = 1100, H = 620;
canvas.width = W; canvas.height = H;

// ── COSTANTI ──────────────────────────────────────────────────────────────────
const GOAL_W = 14, GOAL_H = 140;
const PLAYER_R = 18, BALL_R = 13;

const PLAYER_SPEED_NORMAL = 1.6;
const PLAYER_SPEED_KICK   = 1.0;   // più lento mentre carica
const PLAYER_ACCEL        = 0.38;
const PLAYER_FRICTION     = 0.72;
const BALL_FRICTION       = 0.982;
const BALL_BOUNCE         = 0.55;
const BALL_HIT_RESTITUTION = 0.6;

const KICK_FORCE_MIN  = 2.5;
const KICK_FORCE_MAX  = 6.5;
const KICK_CHARGE_MAX = 45;

// Raggio del cerchio decorativo intorno al player
const AURA_R_BASE   = 10;  // quanto supera il raggio del player
const AURA_R_CHARGE = 10;  // espansione extra al massimo della carica

const MATCH_TIME = 180;

const FIELD = {
  left: 50, right: W - 50, top: 50, bottom: H - 50,
  get goalY() { return H / 2 - GOAL_H / 2; },
  get goalH() { return GOAL_H; }
};

// ── STATO ─────────────────────────────────────────────────────────────────────
let score = [0, 0], timeLeft = MATCH_TIME, gameOver = false;
let goalCooldown = 0, ticker = 0;
let players, ball;
const keys = {};

function mkPlayer(x, y, col, num, kickKey) {
  return {
    x, y, vx: 0, vy: 0,
    r: PLAYER_R, col, num, kickKey,
    kickCharge: 0,
    kickHeld: false
  };
}
function mkBall() {
  return {
    x: W / 2, y: H / 2,
    vx: (Math.random() - 0.5) * 1.5,
    vy: (Math.random() - 0.5) * 1.5,
    r: BALL_R
  };
}

function reset(full) {
  players = [
    mkPlayer(W * 0.25, H / 2, '#e84444', 0, 'ControlLeft'),
    mkPlayer(W * 0.75, H / 2, '#4488ee', 1, 'Space')
  ];
  ball = mkBall();
  if (full) { score = [0, 0]; timeLeft = MATCH_TIME; gameOver = false; ticker = 0; }
  goalCooldown = 80;
  if (full) document.getElementById('msg').textContent = 'WASD + Ctrl per tirare  |  Frecce + Spazio per tirare';
  else      document.getElementById('msg').textContent = '';
}
reset(true);

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  // previeni scroll pagina
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','ControlLeft','ControlRight'].includes(e.code))
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.getElementById('btn-restart').onclick = () => { reset(true); updateHUD(); };

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('sr').textContent = score[0];
  document.getElementById('sb').textContent = score[1];
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

// ── FISICA ────────────────────────────────────────────────────────────────────
function circleCollide(a, b, restitution) {
  const rest = restitution !== undefined ? restitution : 1.0;
  const dx = b.x - a.x, dy = b.y - a.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  const minD = a.r + b.r;
  if (d < minD && d > 0.01) {
    const nx = dx / d, ny = dy / d;
    const overlap = (minD - d) / 2;
    a.x -= nx * overlap; a.y -= ny * overlap;
    b.x += nx * overlap; b.y += ny * overlap;
    const rv = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
    if (rv < 0) {
      const imp = rv * rest;
      a.vx += imp * nx; a.vy += imp * ny;
      b.vx -= imp * nx; b.vy -= imp * ny;
    }
  }
}

function doKick(p, b, force) {
  const dx = b.x - p.x, dy = b.y - p.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d < p.r + b.r + 8) {
    const nx = d > 0.01 ? dx / d : 1;
    const ny = d > 0.01 ? dy / d : 0;
    b.vx = nx * force + p.vx * 0.25;
    b.vy = ny * force + p.vy * 0.25;
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function updatePlayer(p, upKey, downKey, leftKey, rightKey) {
  const isCharging = keys[p.kickKey];
  const maxSpeed = isCharging ? PLAYER_SPEED_KICK : PLAYER_SPEED_NORMAL;

  if (isCharging) {
    p.kickCharge = Math.min(p.kickCharge + 1, KICK_CHARGE_MAX);
  } else {
    if (p.kickHeld && p.kickCharge > 0) {
      const t = p.kickCharge / KICK_CHARGE_MAX;
      doKick(p, ball, KICK_FORCE_MIN + t * (KICK_FORCE_MAX - KICK_FORCE_MIN));
    }
    p.kickCharge = 0;
  }
  p.kickHeld = isCharging;

  if (keys[upKey])    p.vy -= PLAYER_ACCEL;
  if (keys[downKey])  p.vy += PLAYER_ACCEL;
  if (keys[leftKey])  p.vx -= PLAYER_ACCEL;
  if (keys[rightKey]) p.vx += PLAYER_ACCEL;

  const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
  if (speed > maxSpeed) { p.vx = (p.vx / speed) * maxSpeed; p.vy = (p.vy / speed) * maxSpeed; }

  p.x += p.vx; p.y += p.vy;
  p.vx *= PLAYER_FRICTION; p.vy *= PLAYER_FRICTION;

  if (p.x < FIELD.left  + p.r) { p.x = FIELD.left  + p.r; p.vx *= -0.3; }
  if (p.x > FIELD.right - p.r) { p.x = FIELD.right - p.r; p.vx *= -0.3; }
  if (p.y < FIELD.top   + p.r) { p.y = FIELD.top   + p.r; p.vy *= -0.3; }
  if (p.y > FIELD.bottom - p.r){ p.y = FIELD.bottom - p.r; p.vy *= -0.3; }
}

function update() {
  if (gameOver) return;
  if (goalCooldown > 0) { goalCooldown--; return; }
  ticker++;

  updatePlayer(players[0], 'KeyW', 'KeyS', 'KeyA', 'KeyD');
  updatePlayer(players[1], 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight');

  circleCollide(players[0], players[1], 0.7);

  ball.x += ball.vx; ball.y += ball.vy;
  ball.vx *= BALL_FRICTION; ball.vy *= BALL_FRICTION;

  for (const p of players) circleCollide(p, ball, BALL_HIT_RESTITUTION);

  const inGoalY = ball.y > FIELD.goalY && ball.y < FIELD.goalY + GOAL_H;

  if (ball.x - ball.r < FIELD.left) {
    if (inGoalY) { goal(1); return; }
    ball.x = FIELD.left + ball.r; ball.vx *= -BALL_BOUNCE;
  }
  if (ball.x + ball.r > FIELD.right) {
    if (inGoalY) { goal(0); return; }
    ball.x = FIELD.right - ball.r; ball.vx *= -BALL_BOUNCE;
  }
  if (ball.y - ball.r < FIELD.top)    { ball.y = FIELD.top    + ball.r; ball.vy *= -BALL_BOUNCE; }
  if (ball.y + ball.r > FIELD.bottom) { ball.y = FIELD.bottom - ball.r; ball.vy *= -BALL_BOUNCE; }

  if (ticker % 60 === 0 && timeLeft > 0) {
    timeLeft--;
    updateHUD();
    if (timeLeft === 0) endGame();
  }
}

function goal(team) {
  score[team]++;
  updateHUD();
  const who = team === 0 ? '🔴 Rossi' : '🔵 Blu';
  document.getElementById('msg').textContent = `⚽ GOOOL! ${who} segnano! (${score[0]} - ${score[1]})`;
  goalCooldown = 130;
  reset(false);
}

function endGame() {
  gameOver = true;
  let msg;
  if      (score[0] > score[1]) msg = `🏆 Vincono i ROSSI! (${score[0]}-${score[1]}) — Restart per rigiocare.`;
  else if (score[1] > score[0]) msg = `🏆 Vincono i BLU! (${score[0]}-${score[1]}) — Restart per rigiocare.`;
  else                           msg = `🤝 Pareggio! (${score[0]}-${score[1]}) — Restart per rigiocare.`;
  document.getElementById('msg').textContent = msg;
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function drawField() {
  const fw = FIELD.right - FIELD.left, fh = FIELD.bottom - FIELD.top;

  ctx.fillStyle = '#2a5c2a';
  ctx.fillRect(FIELD.left, FIELD.top, fw, fh);

  // Strisce erba
  ctx.fillStyle = 'rgba(0,0,0,.04)';
  for (let i = 0; i < 10; i++) ctx.fillRect(FIELD.left + i * fw / 10, FIELD.top, fw / 20, fh);

  // Bordo campo
  ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(FIELD.left, FIELD.top, fw, fh);
  ctx.beginPath(); ctx.moveTo(W / 2, FIELD.top); ctx.lineTo(W / 2, FIELD.bottom); ctx.stroke();

  // Cerchio centrale
  ctx.beginPath(); ctx.arc(W / 2, H / 2, 65, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,.22)'; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.05)'; ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  ctx.beginPath(); ctx.arc(W / 2, H / 2, 3, 0, Math.PI * 2); ctx.fill();

  // Aree rigore
  ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = 1;
  const aW = 110, aH = 220, aY = (H - aH) / 2;
  ctx.strokeRect(FIELD.left, aY, aW, aH);
  ctx.strokeRect(FIELD.right - aW, aY, aW, aH);

  // Piccola area
  const pW = 50, pH = 120, pY = (H - pH) / 2;
  ctx.strokeRect(FIELD.left, pY, pW, pH);
  ctx.strokeRect(FIELD.right - pW, pY, pW, pH);

  // Porte
  ctx.fillStyle = 'rgba(255,255,255,.08)';
  ctx.fillRect(FIELD.left - GOAL_W, FIELD.goalY, GOAL_W, GOAL_H);
  ctx.fillRect(FIELD.right,         FIELD.goalY, GOAL_W, GOAL_H);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(FIELD.left, FIELD.goalY);
  ctx.lineTo(FIELD.left - GOAL_W, FIELD.goalY);
  ctx.lineTo(FIELD.left - GOAL_W, FIELD.goalY + GOAL_H);
  ctx.lineTo(FIELD.left, FIELD.goalY + GOAL_H);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(FIELD.right, FIELD.goalY);
  ctx.lineTo(FIELD.right + GOAL_W, FIELD.goalY);
  ctx.lineTo(FIELD.right + GOAL_W, FIELD.goalY + GOAL_H);
  ctx.lineTo(FIELD.right, FIELD.goalY + GOAL_H);
  ctx.stroke();

  // Retine
  ctx.strokeStyle = 'rgba(255,255,255,.09)'; ctx.lineWidth = 0.5;
  for (let y = FIELD.goalY; y < FIELD.goalY + GOAL_H; y += 12) {
    ctx.beginPath(); ctx.moveTo(FIELD.left - GOAL_W, y); ctx.lineTo(FIELD.left, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(FIELD.right, y); ctx.lineTo(FIELD.right + GOAL_W, y); ctx.stroke();
  }
}

function lerpColor(hex1, hex2, t) {
  const r1 = parseInt(hex1.slice(1,3),16), g1 = parseInt(hex1.slice(3,5),16), b1 = parseInt(hex1.slice(5,7),16);
  const r2 = parseInt(hex2.slice(1,3),16), g2 = parseInt(hex2.slice(3,5),16), b2 = parseInt(hex2.slice(5,7),16);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

function drawPlayer(p) {
  const isCharging = p.kickHeld;
  const chargeRatio = p.kickCharge / KICK_CHARGE_MAX; // 0..1

  // ── Aura (sempre visibile) ────────────────────────────────────────────────
  // Raggio aura: cresce con la carica
  const auraR = p.r + AURA_R_BASE + (isCharging ? chargeRatio * AURA_R_CHARGE : 0);

  // Cerchio esterno: trasparente di base, bianco pieno sotto carica
  const auraAlpha = isCharging ? 0.15 + chargeRatio * 0.55 : 0.12;
  ctx.beginPath(); ctx.arc(p.x, p.y, auraR, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,255,255,${auraAlpha})`;
  ctx.lineWidth = isCharging ? 2 + chargeRatio * 2.5 : 1.2;
  ctx.stroke();

  // Fill interno semi-trasparente (sempre)
  ctx.beginPath(); ctx.arc(p.x, p.y, auraR, 0, Math.PI * 2);
  ctx.fillStyle = isCharging
    ? `rgba(255,255,255,${0.04 + chargeRatio * 0.10})`
    : 'rgba(255,255,255,0.04)';
  ctx.fill();

  // Arco di carica (solo quando si carica)
  if (isCharging && chargeRatio > 0) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, auraR, -Math.PI / 2, -Math.PI / 2 + chargeRatio * Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${0.5 + chargeRatio * 0.5})`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // ── Ombra ─────────────────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  ctx.beginPath(); ctx.ellipse(p.x + 2, p.y + 4, p.r, p.r * 0.55, 0, 0, Math.PI * 2); ctx.fill();

  // ── Corpo: schiarisce verso bianco durante la carica ──────────────────────
  ctx.fillStyle = isCharging ? lerpColor(p.col, '#ffffff', chargeRatio * 0.55) : p.col;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();

  // Riflesso
  ctx.fillStyle = 'rgba(255,255,255,.22)';
  ctx.beginPath(); ctx.arc(p.x - 5, p.y - 5, p.r * 0.42, 0, Math.PI * 2); ctx.fill();

  // Bordo
  ctx.strokeStyle = isCharging ? `rgba(255,255,255,${0.6 + chargeRatio * 0.4})` : 'rgba(255,255,255,.45)';
  ctx.lineWidth = isCharging ? 2 + chargeRatio : 1.5;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.stroke();

  // Numero
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Segoe UI';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(p.num === 0 ? '1' : '2', p.x, p.y + 1);
}

function drawBall() {
  ctx.fillStyle = 'rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.ellipse(ball.x + 2, ball.y + 4, ball.r, ball.r * 0.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r * 0.38, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 0.8;
  for (let i = 0; i < 5; i++) {
    const a = i * Math.PI * 2 / 5 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(ball.x + Math.cos(a) * ball.r * 0.38, ball.y + Math.sin(a) * ball.r * 0.38);
    ctx.lineTo(ball.x + Math.cos(a) * ball.r * 0.88, ball.y + Math.sin(a) * ball.r * 0.88);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.beginPath(); ctx.arc(ball.x - 3, ball.y - 3, ball.r * 0.3, 0, Math.PI * 2); ctx.fill();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(0, 0, W, H);
  drawField();
  for (const p of players) drawPlayer(p);
  drawBall();

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,.52)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.font = '500 26px Segoe UI';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Partita terminata!', W / 2, H / 2);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
